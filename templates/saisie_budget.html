<!DOCTYPE html>
<html>
<head>
    <title>Saisie budget</title>
</head>

<body>

<h1>Simulation budget</h1>

<h2>Ajouter un revenu</h2>

<form method="POST" action="/revenu">

<label>Type de revenu</label>

<select name="type_revenu">
{% for r in type_revenu %}
<option value="{{ r }}">{{ r }}</option>
{% endfor %}
</select>

<br><br>

<label>Montant (€)</label>
<input type="number" step="0.01" name="montant" required>

<br><br>

<label>Périodicité</label>

<select name="periodicite">
<option value="mensuelle">Mensuelle</option>
<option value="annuelle">Annuelle</option>
<option value="unique">Unique</option>
</select>

<br><br>

<label>Jour</label>

<select name="jour">
{% for j in jours %}
<option value="{{ j }}">{{ j }}</option>
{% endfor %}
</select>

<br><br>

<label>Mois (si annuel ou unique)</label>

<select name="mois">
<option value="">--</option>
{% for m in mois %}
<option value="{{ m }}">{{ m }}</option>
{% endfor %}
</select>

<br><br>

<button type="submit">Ajouter revenu</button>

</form>


<hr>

<h2>Ajouter une dépense</h2>

<form method="POST" action="/depense">

<label>Nom de la dépense</label>
<input type="text" name="nom" required>

<br><br>

<label>Montant (€)</label>
<input type="number" step="0.01" name="montant" required>

<br><br>

<label>Type de dépense</label>

<select name="type_depense">
<option value="fixe">Fixe</option>
<option value="variable">Variable</option>
<option value="unique">Unique</option>
</select>

<br><br>

<label>Jour</label>

<select name="jour">
{% for j in jours %}
<option value="{{ j }}">{{ j }}</option>
{% endfor %}
</select>

<br><br>

<label>Mois (si dépense unique)</label>

<select name="mois">
<option value="">--</option>
{% for m in mois %}
<option value="{{ m }}">{{ m }}</option>
{% endfor %}
</select>

<br><br>

<button type="submit">Ajouter dépense</button>

</form>


<hr>

<h2>Ajouter une épargne</h2>

<form method="POST" action="/epargne">

<label>Type d'épargne</label>

<select name="type_epargne">
{% for k,v in type_epargne.items() %}
<option value="{{ k }}">{{ v }}</option>
{% endfor %}
</select>

<br><br>

<label>Montant initial (€)</label>
<input type="number" step="0.01" name="montant_initial" required>

<br><br>

<label>Versement programmé mensuel (€)</label>
<input type="number" step="0.01" name="versement_mensuel">

<br><br>

<label>Taux (%)</label>
<input type="number" step="0.01" name="taux">

<br><br>

<button type="submit">Ajouter épargne</button>

</form>


</body>
</html>
