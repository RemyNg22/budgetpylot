<!DOCTYPE html>
<html>
<head>
    <title>Test Budget</title>
</head>
<body>
    <h1>Test Liste Déroulante Revenus et Épargne</h1>

    <h2>Type de revenu</h2>
    <select>
        {% for r in type_revenu %}
        <option value="{{ r }}">{{ r }}</option>
        {% endfor %}
    </select>

    <h2>Type d'épargne</h2>
    <select>
        {% for k, v in type_epargne.items() %}
        <option value="{{ k }}">{{ v }}</option>
        {% endfor %}
    </select>

    <h2>Jour</h2>
    <select>
        {% for j in jours %}
        <option value="{{ j }}">{{ j }}</option>
        {% endfor %}
    </select>

    <h2>Mois</h2>
    <select>
        {% for m in mois %}
        <option value="{{ m }}">{{ m }}</option>
        {% endfor %}
    </select>
</body>
</html>
